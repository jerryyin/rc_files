volumes:
  tools_volume:
    external: false

x-base-service: &base-service
  container_name: ${COMPOSE_PROJECT_NAME:-dev}
  hostname: ${COMPOSE_PROJECT_NAME:-zyin}
  command: ["bash", "-c", "scripts/docker/env/priv.sh && exec /bin/zsh"]
  tty: true
  stdin_open: true
  network_mode: host
  devices:
    - /dev/kfd
    - /dev/dri
  group_add:
    - video
  cap_add:
    - SYS_PTRACE
  security_opt:
    - seccomp=unconfined
  tmpfs:
    - "${HOME}/.vscode-server:exec"
  volumes:
    - /data:/data
    - $HOME:/zyin
    # tools_volume:/usr/local intentionally omitted — testing whether
    # any service actually relies on tools-setup's /usr/local overlay.
    # If you need ctags or other packelf'd tools, re-add the mount AND
    # re-add `depends_on: [tools-setup]` to the consuming service.

services:
  tools-setup:
    command: ["/bin/sh", "-c", "cp -r /usr/local/* /tools || true"]
    tty: true
    stdin_open: true
    build:
      context: .
      dockerfile: tools.dockerfile  # Build tools image as usual
      args:
        BASE_IMAGE: ubuntu:24.04
        SERVICE_NAME: tools-setup
    image: jeryin/dev:tools
    container_name: zyin-tools-setup
    volumes:
      - tools_volume:/tools  # Mount volume to receive tools
    restart: "no"

  base:
    <<: *base-service
    build:
      context: .
      dockerfile: base.dockerfile
      args:
        BASE_IMAGE: rocm/dev-ubuntu-24.04:latest
        SERVICE_NAME: base
    image: "jeryin/dev:base"
    profiles: ["base"]

  rocmlir:
    <<: *base-service
    build:
      context: ..
      dockerfile: .docker/base.dockerfile
      args:
        BASE_IMAGE: rocm/mlir:latest
        SERVICE_NAME: rocmlir
    image: "jeryin/dev:rocmlir"
    profiles: ["rocmlir"]

  ck:
    <<: *base-service
    build:
      context: ..
      dockerfile: .docker/base.dockerfile
      args:
        BASE_IMAGE: rocm/composable_kernel:ck_ub24.04_rocm7.0.1_amd-staging
        SERVICE_NAME: ck
    image: "jeryin/dev:ck"
    profiles: ["ck"]

  triton:
    <<: *base-service
    build:
      context: ..
      dockerfile: .docker/base.dockerfile
      args:
        BASE_IMAGE: rocm/pytorch:latest
        SERVICE_NAME: triton
    image: "jeryin/dev:triton"
    profiles: ["triton"]

  mi450:
    build:
      context: ..
      dockerfile: scripts/docker/triton-mi450.dockerfile
      args:
        DOCKER_USERID: "32000"
        DOCKER_GROUPID: "32000"
        DOCKER_RENDERID: "107"  # render group GID so mirror user can access GPU nodes
        USE_NPI_TORCH: "TRUE"   # NPI torch + rocm-sdk-devel from rocm.genesis.amd.com/whl/gfx1250/
        # USE_ROCCAP: "TRUE"    # Uncomment to also build rocplaycap (requires NPI torch)
    image: "jeryin/dev:mi450"
    profiles: ["triton-mi450"]

  triton-mi450:
    <<: *base-service
    build:
      context: ..
      dockerfile: .docker/base.dockerfile
      args:
        BASE_IMAGE: jeryin/dev:mi450
        SERVICE_NAME: triton
    image: "jeryin/dev:triton-mi450"
    profiles: ["triton-mi450"]
    # mi450 is a BUILD-time dep only (BASE_IMAGE: jeryin/dev:mi450); not a
    # runtime sidecar. Rebuild via: dbuild mi450 && dbuild triton-mi450.
    #
    # AM+FFM volume mount - the rocdtif-*-am+ffmlite-* package now serves
    # both AM (architecture model) and FFM (functional fast model) workloads,
    # so a single mount at /am-ffm is sufficient. (run_on_model.sh
    # auto-detects /am-ffm.)
    #
    # Override the default version with AM_FFM_DIR, e.g.
    #   AM_FFM_DIR=~/rocdtif-7.13-am+ffmlite-mi400-rNEW drun triton-mi450
    #
    # Note: Must duplicate base volumes since YAML merge replaces arrays entirely
    volumes:
      - /data:/data
      - $HOME:/zyin
      - ${AM_FFM_DIR:-$HOME/rocdtif-7.13-am+ffmlite-mi400-r4.05}:/am-ffm

  # Real gfx1250 hardware (B0 / MI450 beta machine), NOT the simulator.
  # Two-stage like mi450 -> triton-mi450:
  #   b0        builds scripts/docker/triton-b0.dockerfile from ubuntu:24.04,
  #             installing ROCm + PyTorch for gfx1250 from the genesis wheel
  #             index (no AM+FFM model -- this is real silicon).
  #   triton-b0 wraps jeryin/dev:b0 via base.dockerfile to add the dev env and
  #             clone upstream triton (SERVICE_NAME=triton -> workspace/triton.sh).
  #
  # Rebuild via: dbuild b0 && dbuild triton-b0
  b0:
    build:
      context: ..
      dockerfile: scripts/docker/triton-b0.dockerfile
      args:
        BASE_IMAGE: ubuntu:24.04
    image: "jeryin/dev:b0"
    profiles: ["triton-b0"]

  triton-b0:
    <<: *base-service
    build:
      context: ..
      dockerfile: .docker/base.dockerfile
      args:
        BASE_IMAGE: jeryin/dev:b0
        SERVICE_NAME: triton
    image: "jeryin/dev:triton-b0"
    profiles: ["triton-b0"]

  iree:
    <<: *base-service
    build:
      context: ..
      dockerfile: .docker/base.dockerfile
      args:
        BASE_IMAGE: rocm/dev-ubuntu-24.04:latest
        SERVICE_NAME: iree
    image: "jeryin/dev:iree"
